name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  check:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Setup Node
        with:
          node-version: "24"
        uses: actions/setup-node@v6
      - name: Setup Deno
        with:
          deno-version: 2.x
        uses: denoland/setup-deno@v2
      - name: Install Dependencies
        run: bun install --frozen-lockfile
      - name: Verify Workflow Guardrails
        run: bun run verify:workflows
      - name: Build Packages
        run: bun run build:check
      - name: Run Bun Checks
        run: bun run check
      - name: Run SDK Coverage
        run: bun run coverage
      - name: Upload Coverage Report
        with:
          name: coverage-lcov
          path: coverage/lcov.info
        uses: actions/upload-artifact@v4
      - name: Run Node Compatibility Tests
        run: bun run test:vitest:node
      - name: Verify npm Compatibility
        run: npm install --dry-run
