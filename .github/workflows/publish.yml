name: Publish
on:
  push:
    tags:
      - v*
permissions: read-all
jobs:
  publish-npm:
    name: Publish to npm
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
        uses: actions/setup-node@v4
      - name: Install Dependencies
        run: npm ci
      - name: Build Packages
        run: bun run build:check
      - name: Run Tests
        run: npm test
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --workspace packages/shared --access public && npm publish --workspace packages/sdk --access public && npm publish --workspace packages/cli --access public
  publish-jsr:
    name: Publish to JSR
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Publish to JSR
        run: npx jsr publish
  github-release:
    name: Create GitHub Release
    needs:
      - publish-npm
      - publish-jsr
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes
